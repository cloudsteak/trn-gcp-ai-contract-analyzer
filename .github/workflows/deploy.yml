name: Deploy

on:
  push:
    branches:
      - main

env:
  GCP_REGION: europe-west1
  BACKEND_SERVICE: contract-analyzer-backend
  FRONTEND_SERVICE: contract-analyzer-frontend

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy backend to Cloud Run
        working-directory: backend
        env:
          SERVICE_ACCOUNT: contract-analyzer-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com
        run: |
          gcloud run deploy "${BACKEND_SERVICE}" \
            --source . \
            --region "${GCP_REGION}" \
            --platform managed \
            --allow-unauthenticated \
            --service-account "${SERVICE_ACCOUNT}" \
            --set-env-vars="GEMINI_MODEL=gemini-3.1-flash-lite,GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},GEMINI_LOCATION=global,CORS_ORIGINS=*"

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Resolve backend URL
        id: backend
        run: |
          BACKEND_URL="$(gcloud run services describe "${BACKEND_SERVICE}" \
            --region "${GCP_REGION}" \
            --format='value(status.url)')"
          echo "url=${BACKEND_URL}" >> "${GITHUB_OUTPUT}"

      - name: Deploy frontend to Cloud Run
        working-directory: frontend
        env:
          SERVICE_ACCOUNT: contract-analyzer-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com
        run: |
          gcloud run deploy "${FRONTEND_SERVICE}" \
            --source . \
            --region "${GCP_REGION}" \
            --platform managed \
            --allow-unauthenticated \
            --service-account "${SERVICE_ACCOUNT}" \
            --set-build-env-vars="VITE_API_URL=${{ steps.backend.outputs.url }}"
